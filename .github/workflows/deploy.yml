name: Deploy to Hostinger

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, pdo, pdo_mysql, zip, bcmath, intl

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Install NPM dependencies & build assets
        run: |
          npm install
          npm run build

      - name: Prepare .env
        run: |
          cp .env.example .env
          php artisan key:generate
          echo "APP_ENV=production" >> .env
          echo "APP_DEBUG=false" >> .env
          echo "APP_URL=https://akagroupconsulting.com" >> .env
          echo "DB_CONNECTION=mysql" >> .env
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
          echo "DB_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "FILESYSTEM_DISK=public" >> .env

      - name: Deploy to companyprofile folder
        uses: burnett01/rsync-deployments@6.0.0
        with:
          switches: -avzr --delete --exclude=.env
          path: ./
          remote_path: /home/u408052271/domains/akagroupconsulting.com/companyprofile
          remote_host: ${{ secrets.HOSTINGER_HOST }}
          remote_port: ${{ secrets.HOSTINGER_PORT }}
          remote_user: u408052271
          remote_key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}

      - name: Copy public content to public_html and fix index.php
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: u408052271
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          script: |
            rm -rf /home/u408052271/domains/akagroupconsulting.com/public_html/*
            cp -r /home/u408052271/domains/akagroupconsulting.com/companyprofile/public/* /home/u408052271/domains/akagroupconsulting.com/public_html/
            sed -i 's|__DIR__."/../bootstrap/app.php|__DIR__."/../companyprofile/bootstrap/app.php|g' /home/u408052271/domains/akagroupconsulting.com/public_html/index.php
            sed -i 's|__DIR__."/../vendor/autoload.php|__DIR__."/../companyprofile/vendor/autoload.php|g' /home/u408052271/domains/akagroupconsulting.com/public_html/index.php

      - name: Run migrations, cache & storage link
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}     
          username: u408052271
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          script: |
            cd /home/u408052271/domains/akagroupconsulting.com/companyprofile
            php artisan migrate --force
            php artisan storage:link --force
            php artisan config:cache
            php artisan route:cache 
            php artisan view:cache
            php artisan event:cache
            php artisan optimize
            php artisan db:seed --class=ServiceSeeder --force

      - name: Setup .htaccess for caching & performance
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          port: ${{ secrets.HOSTINGER_PORT }}
          username: u408052271
          key: ${{ secrets.HOSTINGER_SSH_PRIVATE_KEY }}
          script: |
            # Copy default Laravel .htaccess
            cp /home/u408052271/domains/akagroupconsulting.com/companyprofile/public/.htaccess /home/u408052271/domains/akagroupconsulting.com/public_html/.htaccess
            
            # Append performance headers
            cat >> /home/u408052271/domains/akagroupconsulting.com/public_html/.htaccess << 'HTEOF'

            # ── Gzip Compression ──────────────────────────────
            <IfModule mod_deflate.c>
                AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css
                AddOutputFilterByType DEFLATE text/javascript application/javascript application/x-javascript
                AddOutputFilterByType DEFLATE application/json application/xml application/xhtml+xml
                AddOutputFilterByType DEFLATE image/svg+xml font/ttf font/otf application/font-woff application/font-woff2
            </IfModule>

            # ── Browser Caching ───────────────────────────────
            <IfModule mod_expires.c>
                ExpiresActive On
                ExpiresByType image/jpeg "access plus 1 year"
                ExpiresByType image/png  "access plus 1 year"
                ExpiresByType image/gif  "access plus 1 year"
                ExpiresByType image/webp "access plus 1 year"
                ExpiresByType image/svg+xml "access plus 1 year"
                ExpiresByType image/x-icon "access plus 1 year"
                ExpiresByType font/ttf   "access plus 1 year"
                ExpiresByType font/woff  "access plus 1 year"
                ExpiresByType font/woff2 "access plus 1 year"
                ExpiresByType application/font-woff  "access plus 1 year"
                ExpiresByType application/font-woff2 "access plus 1 year"
                ExpiresByType text/css              "access plus 1 year"
                ExpiresByType application/javascript "access plus 1 year"
                ExpiresByType text/javascript        "access plus 1 year"
                ExpiresByType text/html "access plus 0 seconds"
            </IfModule>

            <IfModule mod_headers.c>
                <FilesMatch "\.(ico|jpg|jpeg|png|gif|webp|svg|css|js|woff|woff2|ttf|eot)$">
                    Header set Cache-Control "max-age=31536000, public, immutable"
                </FilesMatch>
                Header set X-Content-Type-Options "nosniff"
                Header set X-Frame-Options "SAMEORIGIN"
                Header set Referrer-Policy "strict-origin-when-cross-origin"
            </IfModule>
            HTEOF